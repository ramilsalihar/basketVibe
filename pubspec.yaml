name: basketvibe
description: "BasketVibe - Basketball Community App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.2
  injectable: ^2.4.4

  # Functional Programming
  dartz: ^0.10.1

  # Navigation
  go_router: ^14.6.2

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # Local Storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  internet_connection_checker: ^1.0.0+1

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.1

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  rename: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.jpg"
